apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sf-keytool
  namespace: platforce
  labels:
    team: platforce
spec:
  image: "{{ image }}"
  port: 8080
  replicas:
    min: 1
    max: 1
  liveness:
    path: /internal/isAlive
  readiness:
    path: /internal/isReady
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    logging:
      destinations:
        - id: loki
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 10m
      memory: 512Mi
  gcp:
    sqlInstances:
      - type: POSTGRES_17
        tier: db-f1-micro
        databases:
          - name: sf-keytool-prod
  ingresses:
    - "https://sf-keytool.intern.nav.no"
  azure:
    application:
      enabled: true
      allowAllUsers: false
      claims:
        groups:
          - id: f423e25e-0862-46a2-ba12-9acb09bba395
    sidecar:
      enabled: true
  accessPolicy:
    outbound:
      external:
        - host: login.salesforce.com
        - host: navdialog.my.salesforce.com
        - host: hooks.slack.com
  envFrom:
    - secret: sf-keytool
    - secret: sf-eventlog
  env:
    - name: CONTEXT
      value: "PROD"